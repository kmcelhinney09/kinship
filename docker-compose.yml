version: '3.8'

services:
  # The PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=devuser
      - POSTGRES_PASSWORD=devpassword
      - POSTGRES_DB=devdb
    ports:
      - "5432:5432"
    restart: unless-stopped

  # The Django Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: django_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_NAME=devdb
      - POSTGRES_USER=devuser
      - POSTGRES_PASSWORD=devpassword
      - POSTGRES_HOST=db
    depends_on:
      - db
    restart: unless-stopped

  # The React Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react_frontend
    command: npm start
    volumes:
      # Mount the code
      - ./frontend:/app
      # Also mount the node_modules directory as a volume to prevent
      # the local node_modules from overwriting the one in the container.
      - /app/node_modules
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
