services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/kinship:cached
    command: sleep infinity
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/kinship
    depends_on:
      - db
    ports:
      - "8000:8000"   # backend
      - "5173:5173"   # vite dev server
  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=kinship
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
volumes:
  postgres_data:
